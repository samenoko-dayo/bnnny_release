name: Build

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: clone repo
        run: |
          git clone https://codeberg.org/samenoko_dayo/bnnny.git
          cd bnnny
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: install dependencies
        run: bun install
      - name: download yt-dlp binary(win)
        if: matrix.platform == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp.exe" -OutFile ".\src-tauri\binaries\yt-dlp-x86_64-pc-windows-msvc.exe"
      - name: download yt-dlp binary(mac)
        if: matrix.platform == 'macos-latest'
        run: |
          curl -L "https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp" -o ".\src-tauri\binaries\yt-dlp-aarch64-apple-darwin"
          chmod +x ".\src-tauri\binaries\yt-dlp-aarch64-apple-darwin"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'bnnny v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
